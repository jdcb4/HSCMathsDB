<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
  <title id="title">Cubic graph seed diagram</title>
  <desc id="desc">A cubic curve with a local maximum near x equals 1 and a local minimum near x equals 3.</desc>
  <rect width="420" height="260" fill="#f8fafc"/>
  <g stroke="#cbd5e1" stroke-width="1">
    <path d="M40 220H390"/>
    <path d="M40 180H390"/>
    <path d="M40 140H390"/>
    <path d="M40 100H390"/>
    <path d="M40 60H390"/>
    <path d="M70 30V230"/>
    <path d="M140 30V230"/>
    <path d="M210 30V230"/>
    <path d="M280 30V230"/>
    <path d="M350 30V230"/>
  </g>
  <g stroke="#0f172a" stroke-width="2">
    <path d="M40 200H390"/>
    <path d="M70 30V230"/>
  </g>
  <path
    d="M70 200 C92 112 115 70 140 80 C170 92 173 176 210 180 C250 184 252 95 280 80 C315 62 350 108 385 155"
    fill="none"
    stroke="#0f766e"
    stroke-width="4"
    stroke-linecap="round"
  />
  <g fill="#c2410c">
    <circle cx="140" cy="80" r="5"/>
    <circle cx="210" cy="180" r="5"/>
  </g>
  <g fill="#334155" font-family="Arial, sans-serif" font-size="14">
    <text x="132" y="62">(1, 6)</text>
    <text x="218" y="184">(3, 2)</text>
    <text x="382" y="216">x</text>
    <text x="52" y="42">h</text>
  </g>
</svg>
